# Wild Coast Mama — Netlify configuration

[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Force HTTPS — redirect all HTTP to HTTPS
[[redirects]]
  from = "http://wildcoastmama.co.uk/*"
  to = "https://wildcoastmama.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.wildcoastmama.co.uk/*"
  to = "https://wildcoastmama.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.wildcoastmama.co.uk/*"
  to = "https://wildcoastmama.co.uk/:splat"
  status = 301
  force = true

# Security headers applied to every page
[[headers]]
  for = "/*"
  [headers.values]
    # Forces HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Prevents your site being embedded in iframes on other sites (clickjacking protection)
    X-Frame-Options = "DENY"
    # Stops browsers guessing content types (MIME sniffing protection)
    X-Content-Type-Options = "nosniff"
    # Controls what info is sent when someone clicks a link away from your site
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restricts what the browser is allowed to load — prevents malicious scripts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://identity.netlify.com https://api.netlify.com; frame-ancestors 'none';"
    # Disables browser features you don't need (reduces attack surface)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Prevents XSS attacks in older browsers
    X-XSS-Protection = "1; mode=block"

# CSS and fonts cached for a year (they don't change)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images cached for a week
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Admin page — never cache, never index
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"
